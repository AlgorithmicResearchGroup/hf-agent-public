<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HF Agent Results</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Hugging Face Agent Results</p>
        <h1 id="title">Report Index</h1>
        <p class="lede" id="lede">Every completed run appears here as a static entry with direct links to the final report, download, job page, and bucket folder.</p>
      </section>

      <section class="card status-card">
        <h2>Status</h2>
        <p id="status-message">Loading reports…</p>
      </section>

      <section class="reports-header">
        <h2>Reports</h2>
        <p id="report-count"></p>
      </section>

      <section class="reports-grid" id="reports-grid"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
